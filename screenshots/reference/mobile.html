<script>


document.addEventListener("DOMContentLoaded", function () {
  const links = document.querySelectorAll("#fed-main-header-nav a"); // Target all menu links
  const currentURL = window.location.href;

  links.forEach((link) => {
    if (link.href === currentURL) {
      link.classList.add("current-page"); // Add active class to the current page
    }
  });
});


document.addEventListener("DOMContentLoaded", function () {
  function runOnDesktop(callback) {
    function checkScreenSize() {
      if (window.innerWidth > 767) {
        callback(); // Run script when screen is desktop
      }
    }

    checkScreenSize(); // Run on page load
    window.addEventListener("resize", checkScreenSize); // Re-check on resize
  }

  runOnDesktop(function () {
    console.log("Desktop mode: Running scripts...");

    const headers = [
      { element: document.getElementById("fed-main-header-logo"), className: "fed-overlay" },
      { element: document.getElementById("fed-main-header-nav"), className: "fed-overlay" },
      { element: document.getElementById("fed-side-footer"), className: "fed-overlay" }
    ];

    function getBrightnessFromImage(imgElement, x = 1, y = 1) {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      if (!ctx) return 255; // Default to bright if canvas is unsupported

      canvas.width = imgElement.naturalWidth || imgElement.width;
      canvas.height = imgElement.naturalHeight || imgElement.height;
      ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);

      // Get pixel data
      const pixel = ctx.getImageData(x, y, 1, 1).data;
      return (pixel[0] * 299 + pixel[1] * 587 + pixel[2] * 114) / 1000; // Brightness formula
    }

    function updateHeaderClasses() {
      headers.forEach(({ element, className }) => {
        if (!element) return;

        const headerRect = element.getBoundingClientRect();
        let elementBehind = document.elementFromPoint(
          headerRect.left + headerRect.width / 2,
          headerRect.bottom
        );

        if (!elementBehind) return;

        let brightness = 255; // Default brightness (white)

        if (elementBehind.tagName === "IMG") {
          brightness = getBrightnessFromImage(elementBehind);
        } else {
          let bgColor = window.getComputedStyle(elementBehind).backgroundColor;
          let parent = elementBehind;

          while ((bgColor === "rgba(0, 0, 0, 0)" || bgColor === "transparent") && parent !== document.body) {
            parent = parent.parentElement;
            if (!parent) return;
            bgColor = window.getComputedStyle(parent).backgroundColor;
          }

          if (!bgColor || bgColor === "rgba(0, 0, 0, 0)" || bgColor === "transparent") {
            element.classList.remove(className);
            return;
          }

          const rgb = bgColor.match(/\d+/g);
          if (rgb) {
            brightness = (parseInt(rgb[0]) * 299 + parseInt(rgb[1]) * 587 + parseInt(rgb[2]) * 114) / 1000;
          }
        }

        if (brightness < 128) {
          element.classList.add(className); // Dark background → Add class
        } else {
          element.classList.remove(className); // Light background → Remove class
        }
      });
    }

    window.addEventListener("scroll", updateHeaderClasses);
    window.addEventListener("resize", updateHeaderClasses);
    updateHeaderClasses(); // Run on page load

    // Observer for the footer
    const sideFooter = document.getElementById("fed-side-footer");
    const mainFooter = document.getElementById("fed-main-footer");

    if (sideFooter && mainFooter) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            sideFooter.classList.add("hide");
          } else {
            sideFooter.classList.remove("hide");
          }
        });
      }, { threshold: 0.01
      });

      observer.observe(mainFooter);
    }
  });
});

</script>
